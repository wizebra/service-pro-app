<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServicePro Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">ServicePro</div>
            <nav>
                <ul>
                    <li class="active"><a href="#">Dashboard</a></li>
                    <li><a href="#">Orders</a></li>
                    <li><a href="#">Messages</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Welcome Back, Pro</h1>
                <div class="user-profile">
                    <span>Admin User</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <div class="content-area">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Active Orders</h3>
                        <p class="stat-number">12</p>
                    </div>
                    <div class="stat-card">
                        <h3>Revenue</h3>
                        <p class="stat-number">$4,250</p>
                    </div>
                    <div class="stat-card">
                        <h3>Reviews</h3>
                        <p class="stat-number">4.9/5</p>
                    </div>
                </div>

                <section class="catalog-section">
                    <div class="section-header">
                        <h3>Service Catalog</h3>
                        <input type="text" id="service-search" placeholder="Search for a service...">
                    </div>

                    <div class="filter-tabs">
                        <button class="filter-btn active" data-category="all">All</button>
                        <button class="filter-btn" data-category="Dev">Development</button>
                        <button class="filter-btn" data-category="Marketing">Marketing</button>
                        <button class="filter-btn" data-category="Design">Design</button>
                    </div>

                    <div id="services-list" class="services-list">
                        </div>
                </section>
            </div>
        </main>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Complete Your Order</h2>
                <span class="close-btn">&times;</span>
            </div>
            <form id="order-form">
                <label>Project Details</label>
                <textarea id="project-details" placeholder="Tell us about your needs..." required></textarea>
                
                <label>Target Deadline</label>
                <input type="date" required>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-submit">Confirm & Pay</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
